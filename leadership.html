<style>
@media (prefers-reduced-motion: no-preference) {
  @keyframes cellIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes chipIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
  @keyframes pulseDot { 0%, 100% { opacity: 0.35; transform: scale(1); } 50% { opacity: 1; transform: scale(1.4); } }
  .cell { animation: cellIn 0.4s ease-out backwards; }
  .chip { animation: chipIn 0.3s ease-out backwards; }
}
.chip { transition: transform 0.15s ease; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; border: none; position: relative; }
.chip[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #2A2A2A;
  color: #fff;
  font-size: 11px;
  font-weight: 400;
  padding: 5px 10px;
  border-radius: 6px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
  z-index: 10;
}
.chip[data-tooltip]::before {
  content: '';
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: #2A2A2A;
  margin-bottom: -2px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
  z-index: 10;
}
.chip[data-tooltip]:hover::after,
.chip[data-tooltip]:hover::before { opacity: 1; }
.chip:hover { transform: scale(1.08); }
.chip:active { transform: scale(0.96); }
.cell { transition: background 0.2s ease; }
.tgl { position: relative; width: 32px; height: 18px; background: var(--border-strong); border-radius: 9px; display: inline-block; transition: background 0.2s; cursor: pointer; flex-shrink: 0; }
.tgl input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
.tgl-knob { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform 0.2s; pointer-events: none; }
.tgl:has(input:checked) { background: var(--text-accent); }
.tgl:has(input:checked) .tgl-knob { transform: translateX(14px); }
</style>
